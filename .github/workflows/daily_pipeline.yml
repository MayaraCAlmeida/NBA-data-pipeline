name: NBA Daily Pipeline

on:
  schedule:
    - cron: "0 9 * * *"  # 06:00 ET, depois que os jogos terminam
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: instalar dependências
        run: pip install -r requirements.txt

      - name: criar tabelas
        env:
          DB_HOST:     ${{ secrets.NBA_DB_HOST }}
          DB_PORT:     ${{ secrets.NBA_DB_PORT }}
          DB_NAME:     ${{ secrets.NBA_DB_NAME }}
          DB_USER:     ${{ secrets.NBA_DB_USER }}
          DB_PASSWORD: ${{ secrets.NBA_DB_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, psycopg2
          conn = psycopg2.connect(
              host=os.environ["DB_HOST"],
              port=os.environ["DB_PORT"],
              dbname=os.environ["DB_NAME"],
              user=os.environ["DB_USER"],
              password=os.environ["DB_PASSWORD"],
              sslmode="require"
          )
          cur = conn.cursor()
          cur.execute(open("create_tables.sql").read())
          conn.commit()
          conn.close()
          print("tabelas criadas")
          EOF

      - name: rodar pipeline
        env:
          DB_HOST:     ${{ secrets.NBA_DB_HOST }}
          DB_PORT:     ${{ secrets.NBA_DB_PORT }}
          DB_NAME:     ${{ secrets.NBA_DB_NAME }}
          DB_USER:     ${{ secrets.NBA_DB_USER }}
          DB_PASSWORD: ${{ secrets.NBA_DB_PASSWORD }}
        run: python scheduler.py --run-now

      - name: salvar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 14

      - name: resumo de falha
        if: failure()
        run: |
          echo "### pipeline falhou" >> $GITHUB_STEP_SUMMARY
          echo "run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY